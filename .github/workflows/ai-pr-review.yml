name: AI PR Review

on:
  pull_request:
    types:
      - opened
      - ready_for_review
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review Git Flow PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      !github.event.pull_request.draft &&
      (
        (github.base_ref == 'develop' && (
          startsWith(github.head_ref, 'feature/') ||
          startsWith(github.head_ref, 'bugfix/') ||
          startsWith(github.head_ref, 'release/')
        )) ||
        (github.base_ref == 'main' && (
          github.head_ref == 'develop' ||
          startsWith(github.head_ref, 'release/') ||
          startsWith(github.head_ref, 'hotfix/')
        ))
      )
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_REVIEW_MODEL: ${{ vars.OPENAI_REVIEW_MODEL || 'gpt-4.1-mini' }}
      MAX_REVIEW_DIFF_CHARS: "120000"
    steps:
      - name: Review PR diff
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const openAIKey = process.env.OPENAI_API_KEY;
            if (!openAIKey) {
              core.notice("OPENAI_API_KEY is not configured. Skipping AI PR review.");
              return;
            }

            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const ignoredPathPatterns = [
              /^Images\//,
              /(^|\/)\.DS_Store$/,
              /\.xcuserstate$/i,
              /\.(png|jpe?g|gif|webp|heic|pdf|mov|mp4|zip)$/i,
            ];

            const maxDiffChars = Number(process.env.MAX_REVIEW_DIFF_CHARS || 120000);
            let diff = "";
            let omittedFiles = 0;

            for (const file of files) {
              if (!file.patch) {
                continue;
              }

              if (ignoredPathPatterns.some((pattern) => pattern.test(file.filename))) {
                continue;
              }

              const block = [
                `diff --git a/${file.filename} b/${file.filename}`,
                `# status: ${file.status}; additions: ${file.additions}; deletions: ${file.deletions}`,
                file.patch,
              ].join("\n");

              if (diff.length + block.length + 2 > maxDiffChars) {
                omittedFiles += 1;
                continue;
              }

              diff += `${block}\n\n`;
            }

            if (!diff.trim()) {
              core.notice("No textual diff was available for AI PR review.");
              return;
            }

            const changedFiles = files
              .slice(0, 120)
              .map((file) => `- ${file.filename} (${file.status}, +${file.additions}/-${file.deletions})`)
              .join("\n");

            const omittedNote = omittedFiles > 0
              ? `\n\n${omittedFiles} file(s) were omitted because the diff size limit was reached.`
              : "";

            const instructions = [
              "You are reviewing a Mulimi iOS pull request.",
              "Respond in Korean.",
              "Lead with actionable findings. If there are no clear issues, say that briefly.",
              "For each finding, include severity, file path, concrete risk, and a practical fix.",
              "Do not invent facts, line numbers, files, or test results that are not visible in the diff.",
              "Focus on correctness, regressions, security, architecture boundaries, and missing tests.",
              "Mulimi architecture rules:",
              "- DomainLayerInterface and DomainLayer must not depend on SwiftUI, Localization, UI strings, or system images.",
              "- ViewModels must manage presentation state only and must not directly use UIApplication, WidgetCenter, NotificationCenter, Bundle, or UserDefaults.",
              "- Global push navigation belongs in ContentView and AppCoordinator.",
              "- Hydration records use HealthKit as the source of truth.",
              "- The 250ml serving rule must go through HydrationServing.",
              "- Widget and Watch logic must share the same hydration rules as the app.",
            ].join("\n");

            const input = [
              `PR #${pr.number}: ${pr.title}`,
              `Base: ${pr.base.ref}`,
              `Head: ${pr.head.ref}`,
              "",
              "PR body:",
              pr.body || "(empty)",
              "",
              "Changed files:",
              changedFiles || "(none)",
              omittedNote,
              "",
              "Diff:",
              diff,
            ].join("\n");

            const response = await fetch("https://api.openai.com/v1/responses", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${openAIKey}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                model: process.env.OPENAI_REVIEW_MODEL,
                instructions,
                input,
                max_output_tokens: 2500,
                store: false,
              }),
            });

            const rawResponse = await response.text();
            if (!response.ok) {
              core.setFailed(`OpenAI API request failed (${response.status}): ${rawResponse.slice(0, 1000)}`);
              return;
            }

            let payload;
            try {
              payload = JSON.parse(rawResponse);
            } catch (error) {
              core.setFailed(`OpenAI API returned invalid JSON: ${error.message}`);
              return;
            }

            const extractText = (data) => {
              if (typeof data.output_text === "string") {
                return data.output_text.trim();
              }

              const chunks = [];
              for (const item of data.output || []) {
                for (const content of item.content || []) {
                  if (typeof content.text === "string") {
                    chunks.push(content.text);
                  }
                }
              }
              return chunks.join("\n").trim();
            };

            const review = extractText(payload);
            if (!review) {
              core.setFailed("OpenAI API response did not include review text.");
              return;
            }

            const body = [
              "## AI PR Review",
              "",
              review,
              "",
              "<sub>Generated by GitHub Actions. Verify findings before applying changes.</sub>",
            ].join("\n");

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: pr.number,
              event: "COMMENT",
              body,
            });
