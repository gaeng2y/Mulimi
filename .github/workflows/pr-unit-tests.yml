name: PR Unit Tests

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      TEAM_ID: "8UV3Y69NB7"
      GITHUB_TOKEN: ${{ github.token }}
      AQUA_GITHUB_TOKEN: ${{ github.token }}
      IOS_SIMULATOR_DESTINATION: "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Prepare Secrets.xcconfig
        run: |
          set -e
          if [ ! -f XCConfig/Secrets.xcconfig ]; then
            if [ -f XCConfig/Secrets.xcconfig.template ]; then
              sed "s/YOUR_TEAM_ID/${TEAM_ID}/g" XCConfig/Secrets.xcconfig.template > XCConfig/Secrets.xcconfig
            else
              echo "DEVELOPMENT_TEAM = ${TEAM_ID}" > XCConfig/Secrets.xcconfig
            fi
          fi

      - name: Install mise
        run: |
          set -e
          if ! command -v mise >/dev/null 2>&1; then
            curl https://mise.run | sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Install tools and dependencies
        run: |
          set -euo pipefail
          mise --version
          mise install
          tuist version

          cleanup_swiftpm_cache() {
            rm -rf "$HOME/Library/Caches/org.swift.swiftpm"
            rm -rf "$HOME/Library/org.swift.swiftpm"
            rm -rf "$HOME/.swiftpm/cache"
          }

          if ! tuist install; then
            echo "tuist install failed. Resetting SwiftPM cache and retrying once..."
            cleanup_swiftpm_cache
            tuist install
          fi

          tuist generate

      - name: Log Xcode SDKs
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks
          echo "Using destination ${IOS_SIMULATOR_DESTINATION}"

      - name: Run unit tests
        run: |
          set -euo pipefail
          for SCHEME in DomainLayer DataLayer PresentationLayer; do
            echo "Running tests for $SCHEME"
            xcodebuild test \
              -workspace Mulimi.xcworkspace \
              -scheme "$SCHEME" \
              -sdk iphonesimulator \
              -destination "$IOS_SIMULATOR_DESTINATION" \
              -destination-timeout 180 \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          done
