name: PR Unit Tests

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      TEAM_ID: "8UV3Y69NB7"
      GITHUB_TOKEN: ${{ github.token }}
      AQUA_GITHUB_TOKEN: ${{ github.token }}
      IOS_SIMULATOR_OS_PREFIX: "26."
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Prepare Secrets.xcconfig
        run: |
          set -e
          if [ ! -f XCConfig/Secrets.xcconfig ]; then
            if [ -f XCConfig/Secrets.xcconfig.template ]; then
              sed "s/YOUR_TEAM_ID/${TEAM_ID}/g" XCConfig/Secrets.xcconfig.template > XCConfig/Secrets.xcconfig
            else
              echo "DEVELOPMENT_TEAM = ${TEAM_ID}" > XCConfig/Secrets.xcconfig
            fi
          fi

      - name: Install mise
        run: |
          set -e
          if ! command -v mise >/dev/null 2>&1; then
            curl https://mise.run | sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Install tools and dependencies
        run: |
          set -e
          mise --version
          mise install
          tuist version
          tuist install
          tuist generate

      - name: Resolve iOS Simulator destination
        id: destination
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks

          SHOW_DESTINATIONS="$(xcodebuild -showdestinations \
            -workspace Mulimi.xcworkspace \
            -scheme DomainLayer 2>&1 || true)"

          printf '%s\n' "$SHOW_DESTINATIONS"

          IOS_SIM_ID="$(printf '%s\n' "$SHOW_DESTINATIONS" \
            | awk -v os_prefix="$IOS_SIMULATOR_OS_PREFIX" '
              /platform:iOS Simulator/ && index($0, "OS:" os_prefix) {
                match($0, /id:[^,}]+/)
                if (RSTART > 0) {
                  value = substr($0, RSTART + 3, RLENGTH - 3)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                  print value
                  exit
                }
              }
            ')"

          if [ -z "$IOS_SIM_ID" ]; then
            echo "No iOS 26 simulator destination found for DomainLayer."
            xcrun simctl list devices available || true
            exit 1
          fi

          echo "destination=platform=iOS Simulator,id=$IOS_SIM_ID" >> "$GITHUB_OUTPUT"
          echo "Using destination platform=iOS Simulator,id=$IOS_SIM_ID"

      - name: Run unit tests
        run: |
          set -euo pipefail
          DESTINATION="${{ steps.destination.outputs.destination }}"
          for SCHEME in DomainLayer DataLayer PresentationLayer; do
            echo "Running tests for $SCHEME"
            xcodebuild test \
              -workspace Mulimi.xcworkspace \
              -scheme "$SCHEME" \
              -sdk iphonesimulator \
              -destination "$DESTINATION" \
              -destination-timeout 180 \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          done
